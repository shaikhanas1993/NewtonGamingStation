<div class="card h-100 shadow-sm">
  <div class="ngs-card-cover">🎮</div>
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ game().title }}</h5>
    <p class="card-text text-muted small flex-grow-1">
      {{ game().description || 'No description provided.' }}
    </p>
    <div class="mb-2 d-flex gap-1 flex-wrap">
      <ngs-badge tone="primary">{{ game().genreName }}</ngs-badge>
      <ngs-badge tone="info">{{ game().platform }}</ngs-badge>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="fw-bold">{{ game().price | currency }}</span>
      <small class="text-muted"
        >{{ game().releaseDate | date: 'mediumDate' }}</small
      >
    </div>
    <small class="text-muted mb-2">By {{ game().publisherName }}</small>
    <div class="d-flex gap-2">
      <ngs-button
        size="sm"
        variant="outline-primary"
        (clicked)="edit.emit(game().id)"
      >
        Edit
      </ngs-button>
      <ngs-button
        size="sm"
        variant="outline-secondary"
        (clicked)="remove.emit(game())"
      >
        Delete
      </ngs-button>
    </div>
  </div>
</div>
